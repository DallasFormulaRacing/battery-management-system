name: release version

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

permissions:
    id-token: write
    attestations: write
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install GitVersion
              uses: gittools/actions/gitversion/setup@v1.1.1
              with:
                  versionSpec: "5.x"

            - name: Determine Version
              id: gitversion
              uses: gittools/actions/gitversion/execute@v1.1.1

            - name: Use Version
              run: |
                  echo "Full SemVer: ${{ steps.gitversion.outputs.fullSemVer }}"
                  echo "Major.Minor.Patch: ${{ steps.gitversion.outputs.majorMinorPatch }}"

            - name: Cache CMake Build
              uses: actions/cache@v4
              with:
                  path: bms/build
                  key: ${{ runner.os }}-cmake-${{ hashFiles('bms/CMakeLists.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-cmake-

            - name: Install Ninja & Toolchain
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ninja-build gcc-arm-none-eabi

            - name: Configure (CMake)
              working-directory: ./bms
              run: |
                  cmake -S . -B build \
                    -G Ninja \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DPROJECT_VERSION_FULL="${{ steps.gitversion.outputs.fullSemVer }}" \
                    -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake

            - name: Build
              working-directory: ./bms
              run: cmake --build build

            - name: Generate Artifact Attestation
              uses: actions/attest-build-provenance@v2
              if: github.ref == 'refs/heads/master'
              with:
                  subject-path: |
                      bms/build/bms.bin
                      bms/build/bms.elf

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              if: github.ref == 'refs/heads/master'
              with:
                  tag_name: v${{ steps.gitversion.outputs.majorMinorPatch }}
                  generate_release_notes: true
                  name: Release BMS Firmware Version ${{ steps.gitversion.outputs.majorMinorPatch }}
                  body: |

                      **Version:** ${{ steps.gitversion.outputs.fullSemVer }}
                      **Commit Hash:** ${{ steps.gitversion.outputs.sha }}
                      **Build Date:** ${{ steps.gitversion.outputs.commitDate }}



                      Automatically generated by GitHub Actions.
                  draft: false
                  prerelease: false
                  files: |
                      bms/build/bms.bin
                      bms/build/bms.elf
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
